name: Bug report
description: Something in DJProxy is broken or not working as expected
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as
        you can — VPN/proxy issues are highly device- and network-dependent, so
        specifics matter a lot here.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Tell us what you saw.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Step-by-step, including the proxy config format you pasted (redact real credentials).
      placeholder: |
        1. Paste proxy config '...'
        2. Tap Connect
        3. See error / disconnect
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / logcat
      description: |
        Attach `adb logcat` output if you have it. Please redact any host, username,
        or password values before pasting.
      render: shell

  - type: input
    id: app-version
    attributes:
      label: DJProxy version / commit
      placeholder: e.g. 1.0.0 or commit SHA
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android version
      placeholder: e.g. Android 14
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device model
      placeholder: e.g. Pixel 8, or emulator API 35 (arm64-v8a)
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low (cosmetic / minor)
        - Medium (functional but has a workaround)
        - High (core feature broken)
        - Security (possible leak / vulnerability — consider reporting privately instead, see SECURITY.md)
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this hasn't already been reported.
          required: true
        - label: I removed any real proxy host/username/password from the details above.
          required: true
