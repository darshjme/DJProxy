name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_VERSION: '8.11.1'

jobs:
  build:
    name: Unit test + assemble debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK (r27c) + build-tools
        run: sdkmanager --install "ndk;27.2.12479018" "build-tools;35.0.0" "platforms;android-35"

      # This project has no committed Gradle wrapper (D:\AI\DJProxy\gradlew does not
      # exist locally either) — install the matching Gradle distribution directly and
      # let setup-gradle manage caching + the dependency-verification-free invocation.
      - name: Set up Gradle ${{ env.GRADLE_VERSION }}
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Run unit tests
        run: gradle testDebugUnitTest --stacktrace

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/testDebugUnitTest
          retention-days: 14

      - name: Assemble debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: djproxy-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
