<?xml version="1.0" encoding="UTF-8"?>
<svg width="1180" height="600" viewBox="0 0 1180 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1180" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b949e"/>
    </marker>
  </defs>

  <rect width="1180" height="600" fill="url(#bg2)"/>
  <text x="32" y="40" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#c9d1d9">Live proxy status — no tunnel required</text>
  <text x="32" y="64" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#8b949e">StatusChecker dials the real Validator directly; it never calls VpnController.apply()</text>

  <!-- trigger -->
  <rect x="32" y="96" width="220" height="90" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="142" y="128" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#c9d1d9">Trigger</text>
  <text x="142" y="148" text-anchor="middle" font-family="Consolas, monospace" font-size="10.5" fill="#8b949e">manual "Check all" · row tap</text>
  <text x="142" y="164" text-anchor="middle" font-family="Consolas, monospace" font-size="10.5" fill="#8b949e">stale &gt; 5 min on screen open</text>

  <!-- StatusChecker -->
  <rect x="300" y="88" width="300" height="150" rx="10" fill="#0d2a1f" stroke="#3fb950" stroke-width="1.5"/>
  <text x="450" y="114" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#7ee787">StatusChecker (interface)</text>
  <text x="450" y="136" text-anchor="middle" font-family="Consolas, monospace" font-size="10.5" fill="#c9d1d9">Semaphore(4) bounded concurrency</text>
  <text x="450" y="154" text-anchor="middle" font-family="Consolas, monospace" font-size="10.5" fill="#c9d1d9">60s per-key debounce</text>
  <text x="450" y="172" text-anchor="middle" font-family="Consolas, monospace" font-size="10.5" fill="#c9d1d9">skips under battery-saver mode</text>
  <text x="450" y="192" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#8b949e">impl: ValidatorStatusChecker</text>
  <text x="450" y="210" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#8b949e">no WorkManager, no wakelocks</text>

  <!-- SocketProtector -->
  <rect x="660" y="96" width="230" height="90" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="775" y="122" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9">VpnRuntime.protector</text>
  <text x="775" y="142" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#8b949e">no tunnel: no-op (true)</text>
  <text x="775" y="158" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#8b949e">tunnel live: protect() out of tun</text>
  <text x="775" y="174" text-anchor="middle" font-family="Consolas, monospace" font-size="9.5" fill="#7ee787">the one existing protect() seam</text>

  <!-- PreflightValidator frozen core -->
  <rect x="940" y="88" width="208" height="150" rx="10" fill="#2d1a1a" stroke="#f85149" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="1044" y="114" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#ffa198">PreflightValidator</text>
  <text x="1044" y="132" text-anchor="middle" font-family="Consolas, monospace" font-size="9.5" fill="#c9d1d9">FROZEN CORE — not edited</text>
  <text x="1044" y="152" text-anchor="middle" font-family="Consolas, monospace" font-size="9.5" fill="#c9d1d9">real TCP connect</text>
  <text x="1044" y="168" text-anchor="middle" font-family="Consolas, monospace" font-size="9.5" fill="#c9d1d9">real SOCKS5/HTTP handshake</text>
  <text x="1044" y="184" text-anchor="middle" font-family="Consolas, monospace" font-size="9.5" fill="#c9d1d9">real GET /generate_204 probe</text>
  <text x="1044" y="202" text-anchor="middle" font-family="Consolas, monospace" font-size="9.5" fill="#c9d1d9">NEVER starts DjVpnService</text>
  <text x="1044" y="220" text-anchor="middle" font-family="Consolas, monospace" font-size="9.5" fill="#ffa198">NEVER builds a tun</text>

  <!-- result branch -->
  <rect x="330" y="300" width="220" height="150" rx="10" fill="#0d2a1f" stroke="#3fb950" stroke-width="1.5"/>
  <text x="440" y="330" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#7ee787">Success</text>
  <text x="440" y="352" text-anchor="middle" font-family="Consolas, monospace" font-size="10.5" fill="#c9d1d9">latencyMs</text>
  <text x="440" y="370" text-anchor="middle" font-family="Consolas, monospace" font-size="10.5" fill="#c9d1d9">probeStatus</text>
  <text x="440" y="388" text-anchor="middle" font-family="Consolas, monospace" font-size="10.5" fill="#c9d1d9">exitIp</text>
  <text x="440" y="410" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="600" fill="#7ee787">-&gt; Reachable</text>

  <rect x="590" y="300" width="240" height="150" rx="10" fill="#2d1a1a" stroke="#f85149" stroke-width="1.5"/>
  <text x="710" y="330" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#ffa198">Failure</text>
  <text x="710" y="352" text-anchor="middle" font-family="Consolas, monospace" font-size="10.5" fill="#c9d1d9">ProxyError.message</text>
  <text x="710" y="370" text-anchor="middle" font-family="Consolas, monospace" font-size="10.5" fill="#c9d1d9">ProxyError.hint</text>
  <text x="710" y="392" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#8b949e">(refused, timeout, auth,</text>
  <text x="710" y="408" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#8b949e">not-a-socks5, ...)</text>
  <text x="710" y="430" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="600" fill="#ffa198">-&gt; Unreachable</text>

  <!-- ProxyStatus states -->
  <rect x="32" y="490" width="1116" height="80" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="60" y="516" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#c9d1d9">ProxyStatus published to statuses: StateFlow&lt;Map&lt;String, ProxyStatus&gt;&gt;</text>
  <circle cx="90" cy="546" r="7" fill="#8b949e"/>
  <text x="106" y="551" font-family="Consolas, monospace" font-size="11" fill="#c9d1d9">Unknown</text>
  <circle cx="230" cy="546" r="7" fill="#d29922"/>
  <text x="246" y="551" font-family="Consolas, monospace" font-size="11" fill="#c9d1d9">Checking</text>
  <circle cx="370" cy="546" r="7" fill="#3fb950"/>
  <text x="386" y="551" font-family="Consolas, monospace" font-size="11" fill="#c9d1d9">Reachable(latencyMs, exitIp, checkedAt)</text>
  <circle cx="740" cy="546" r="7" fill="#f85149"/>
  <text x="756" y="551" font-family="Consolas, monospace" font-size="11" fill="#c9d1d9">Unreachable(reason, hint, checkedAt)</text>

  <!-- arrows -->
  <line x1="252" y1="140" x2="298" y2="140" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="600" y1="150" x2="658" y2="140" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="890" y1="150" x2="938" y2="150" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="440" y1="238" x2="440" y2="298" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="1044" y1="238" x2="710" y2="298" stroke="#f85149" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="440" y1="450" x2="400" y2="488" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="710" y1="450" x2="750" y2="488" stroke="#f85149" stroke-width="2" marker-end="url(#arrow2)"/>

  <text x="32" y="592" font-family="Segoe UI, sans-serif" font-size="11" fill="#8b949e">the whole path is pre-flight only — reused verbatim from the existing Apply button, invoked standalone</text>
</svg>
